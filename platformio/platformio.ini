[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = COM3

monitor_speed = 115200
board_build.filesystem = littlefs

lib_deps = 
	tzapu/WiFiManager @ ^2.0.17
	dancol90/ESP8266Ping@^1.1.0
	bblanchon/ArduinoJson@^7.4.2

[env:nodemcuv2-ota]
platform = espressif8266
board = nodemcuv2
framework = arduino

upload_protocol = espota
upload_port = 192.168.0.66

monitor_speed = 115200
board_build.filesystem = littlefs
 
lib_deps = 
	tzapu/WiFiManager @ ^2.0.17
	dancol90/ESP8266Ping@^1.1.0
	bblanchon/ArduinoJson@^7.4.2