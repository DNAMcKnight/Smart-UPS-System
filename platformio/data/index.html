<!DOCTYPE html>
<html>

<head>
    <title>ESP Server</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

<body>
    <nav class="navbar">
        <div class="left-section">
            <div class="menu-icon">
            </div>
        </div>
        <div class="middle-section">

            <div class="logo">
                ESP-Control
            </div>
        </div>
        <div class="right-section">
            <div class="create-section">
                <button class="dark-icon" id="darkToggle"></button>
            </div>
        </div>
    </nav>

    <p class="platform">ESP8266</p>

    <div class="container">
        <div class="control-row">
            <div class="ups-text">Turn ON/OFF UPS
            </div>
            <label class="switch">
                <input id="toggle_ups" type="checkbox">
                <div class="slider round"></div>
            </label>
        </div>
        <div class="control-row">
            <div class="ups-text">Turn OFF PC & UPS
            </div>
            <label class="switch">
                <input id="complete_shutdown" type="checkbox">
                <div class="slider round"></div>
            </label>
        </div>
        <div class="control-row">
            <div class="ups-text">Turn OFF PC
            </div>
            <label class="switch">
                <input id="pc_shutdown" type="checkbox">
                <div class="slider round"></div>
            </label>
        </div>
        <div class="control-row">
            <div class="ups-text">System Sleep Mode
            </div>
            <label class="switch">
                <input id="toggleBtn3" type="checkbox">
                <div class="slider round"></div>
            </label>
        </div>
    </div>

    <script src="/scripts.js" defer></script>
</body>

</html>
